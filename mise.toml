[tools]
node       = "25.9.0"
pnpm       = "11.0.3"
bun        = "1.3.13"
docker-cli = "29.4.3"
yamlfmt    = "0.21.0"

[tasks."test:e2e"]
description = "Run tests against the local Firebase emulator"
run         = "mise exec --env test -- pnpm firebase emulators:exec --project demo-ulti-project 'vitest --run test/flows'"
