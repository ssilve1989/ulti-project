name: CI
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref || '', 'release-please--') }}
    # runs-on: ${{ matrix.os }}
    # strategy:
    #   matrix:
    #     os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm graphql:codegen
        env:
          FFLOGS_API_ACCESS_TOKEN: ${{ secrets.FFLOGS_API_ACCESS_TOKEN }}
      # These checks are mutually independent — they all consume the source and
      # the codegen output but never each other's results (build:check writes
      # dist/, test only writes coverage/, lint is read-only). Run them
      # concurrently; the parallel block waits for all of them before
      # continuing to the coverage upload. There is no separate typecheck +
      # build pair: build:check is `tsc -b` over the project-reference graph,
      # which compiles the app + CLI projects (emitting dist/) and type-checks
      # specs and root config files in one pass.
      - parallel:
          - run: pnpm build:check
          - run: pnpm lint:ci
          - run: pnpm test:ci
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/coverage-final.json
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
