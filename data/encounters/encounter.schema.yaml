$schema: https://json-schema.org/draft/2020-12/schema
type: object
properties:
  id:
    type: string
    minLength: 1
    pattern: "^[A-Z_]+$"
  name:
    type: string
    minLength: 1
  description:
    type: string
    minLength: 1
  mode:
    type: string
    enum:
      - legacy
      - ultimate
      - savage
  active:
    type: boolean
  emoji:
    type: string
  fflogsEncounterIds:
    type: array
    items:
      type: integer
      exclusiveMinimum: 0
      maximum: 9007199254740991
  progPoints:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
          minLength: 1
        label:
          type: string
          minLength: 1
        partyStatus:
          type: string
          enum:
            - Early Prog Party
            - Prog Party
            - Clear Party
            - Cleared
        active:
          type: boolean
      required:
        - id
        - label
        - partyStatus
        - active
      additionalProperties: false
  progPartyThreshold:
    type: string
  clearPartyThreshold:
    type: string
required:
  - id
  - name
  - description
  - active
additionalProperties: false
