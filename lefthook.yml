pre-commit:
  parallel: true
  commands:
    format-yaml:
      glob: "*.{yml,yaml}"
      exclude: "pnpm-lock.yaml"
      run: mise exec -- yamlfmt {staged_files}
    lint:
      glob: "*.{ts,json,html,yaml}"
      run: pnpm check --diagnostic-level=error
    typecheck:
      glob: "*.{ts,json,html,yaml}"
      run: pnpm typecheck
    test:
      glob: "*.{ts,json,html,yaml}"
      run: pnpm test --run
commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
