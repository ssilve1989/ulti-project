pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,json,html,yaml}"
      run: pnpm check --diagnostic-level=error
    typecheck:
      glob: "*.{ts,json,html,yaml}"
      run: pnpm typecheck
    test:
      glob: "*.{ts,json,html,yaml}"
      run: pnpm test --run

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
